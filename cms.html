<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>써밋 중등교과 수행평가 CMS</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif; background:#F1F3F6; color:#1F2A37; }

  .layout { display:flex; min-height:100vh; }

  .sidebar { width:250px; flex-shrink:0; background:#3E5FE8; color:#fff; padding:22px 0 24px; overflow-y:auto; }
  .sb-brand { font-size:15px; font-weight:800; line-height:1.4; padding:0 22px 22px; color:#fff; }
  .sb-top { padding:0 10px; margin-bottom:6px; }
  .sb-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; font-size:14px; font-weight:700; color:rgba(255,255,255,.88); cursor:pointer; border-radius:8px; }
  .sb-item:hover { background:rgba(255,255,255,.08); }
  .sb-item.active-top { background:rgba(255,255,255,.14); color:#fff; }
  .sb-group { margin-bottom:2px; }
  .sb-sub { padding-left:14px; }
  .sb-sub .sb-item { font-size:13.5px; padding:11px 16px; }
  .sb-subsub { padding-left:14px; }
  .sb-subsub .sb-leaf { display:block; font-size:13px; font-weight:600; color:rgba(255,255,255,.72); padding:10px 16px 10px 20px; cursor:pointer; border-radius:8px; position:relative; }
  .sb-subsub .sb-leaf:hover { background:rgba(255,255,255,.08); color:#fff; }
  .sb-subsub .sb-leaf.active { background:rgba(255,255,255,.16); color:#fff; font-weight:800; }
  .sb-subsub .sb-leaf.active::before { content:''; position:absolute; left:6px; top:50%; transform:translateY(-50%); width:3px; height:16px; background:#fff; border-radius:2px; }
  .sb-divider { height:1px; background:rgba(255,255,255,.14); margin:12px 22px; }
  .chevron { font-size:11px; opacity:.75; }

  .content { flex:1; padding:32px 40px; }
  .page-title { font-size:22px; font-weight:800; color:#1F2A37; margin-bottom:22px; }
  .section-title { font-size:16px; font-weight:800; color:#1F2A37; margin-bottom:16px; }

  .filter-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
  .filter-bar select, .filter-bar input[type=date] { border:1.2px solid #DCE1E7; background:#fff; border-radius:8px; padding:9px 12px; font-size:13px; color:#4A5563; font-family:inherit; outline:none; }
  .filter-sep { color:#98A2AE; font-size:13px; }
  .btn-query { background:#1F2A37; color:#fff; border:none; border-radius:8px; padding:9px 18px; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-excel { background:#E7E9ED; color:#9AA3AD; border:none; border-radius:8px; padding:9px 18px; font-size:13px; font-weight:700; cursor:not-allowed; margin-left:auto; }

  .table-card { background:#fff; border:1px solid #E7E9ED; border-radius:12px; overflow:hidden; }
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13.5px; white-space:nowrap; }
  thead th { background:#F8F9FB; color:#6B7480; font-weight:700; font-size:12.5px; text-align:left; padding:13px 18px; border-bottom:1px solid #E7E9ED; }
  tbody td { padding:14px 18px; border-bottom:1px solid #F0F1F4; color:#26313D; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:#FAFBFC; }

  .status-pill { display:inline-block; font-size:12px; font-weight:700; padding:4px 12px; border-radius:999px; }
  .status-done { background:#E6F7EC; color:#1E9E5C; }
  .status-submitted { background:#EAF1FE; color:#2563EB; }
  .status-writing { background:#FEF6E0; color:#B7860B; }
  .status-none { background:#EEF0F3; color:#8A929E; }

  .pagination { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:22px; }
  .pagination button { width:32px; height:32px; border-radius:8px; border:1px solid #E1E5EA; background:#fff; color:#5A6472; font-size:13px; font-weight:600; cursor:pointer; }
  .pagination button.active { background:#2563EB; border-color:#2563EB; color:#fff; }

  .placeholder-box { display:flex; align-items:center; justify-content:center; height:320px; color:#B7BFC8; font-size:13.5px; background:#fff; border:1px solid #E7E9ED; border-radius:12px; }
</style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="sb-brand">써밋 중등교과<br>수행평가 CMS</div>

      <div class="sb-top">
        <div class="sb-item" data-view="placeholder">과제 관리</div>

        <div class="sb-group">
          <div class="sb-item" id="statsToggle">통계 <span class="chevron" id="statsChevron">&#9660;</span></div>
          <div class="sb-sub" id="statsChildren">
            <div class="sb-item" id="analysisToggle">과제 & 학습 분석 <span class="chevron" id="analysisChevron">&#9660;</span></div>
            <div class="sb-subsub" id="analysisChildren">
              <div class="sb-leaf" data-view="placeholder">과제별 평균 성과와 변별도</div>
              <div class="sb-leaf" data-view="placeholder">학생 과제 제출 현황</div>
              <div class="sb-leaf" data-view="placeholder">과제별 제출 분량</div>
              <div class="sb-leaf" data-view="placeholder">기본 글쓰기 형태</div>
            </div>
            <div class="sb-item" data-collapsible="true">학생 활동 <span class="chevron">&#9654;</span></div>
            <div class="sb-item" data-collapsible="true">교사 & AI 평가 <span class="chevron">&#9654;</span></div>
            <div class="sb-item" data-collapsible="true">리포트 & 알림 <span class="chevron">&#9654;</span></div>
          </div>
        </div>

        <div class="sb-item" data-view="placeholder">계정 관리</div>
        <div class="sb-item" data-view="placeholder">다운로드 이력</div>

        <div class="sb-divider"></div>
        <div class="sb-item active-top" data-view="ai-diagnosis">글쓰기 AI 진단</div>
      </div>
    </div>

    <div class="content">
      <div id="view-placeholder" class="view" style="display:none">
        <div class="page-title">준비 중인 화면입니다</div>
        <div class="placeholder-box">준비 중입니다.</div>
      </div>

      <div id="view-ai-diagnosis" class="view">
        <div class="page-title">글쓰기 AI 진단</div>
        <div class="section-title">학생 과제 제출 현황</div>

        <div class="filter-bar">
          <select><option>소속 전체</option></select>
          <select><option>브랜드 전체</option></select>
          <select><option>채널 전체</option></select>
          <select><option>과목코드 전체</option></select>
          <select><option>상태 전체</option></select>
          <input type="date" value="2025-01-01">
          <span class="filter-sep">~</span>
          <input type="date" value="2025-12-31">
          <button class="btn-query">조회</button>
          <button class="btn-excel">엑셀 다운로드</button>
        </div>

        <div class="table-card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>학생명</th>
                  <th>과제명</th>
                  <th>학년</th>
                  <th>장르</th>
                  <th>제출 일시</th>
                  <th>제출 상태</th>
                  <th>AI 점수(가칭)</th>
                  <th>교사 점수</th>
                </tr>
              </thead>
              <tbody id="diagnosisRows"></tbody>
            </table>
          </div>
        </div>

        <div class="pagination">
          <button>&laquo;</button><button>&lsaquo;</button>
          <button class="active">1</button><button>2</button><button>3</button><button>4</button><button>5</button><button>6</button>
          <button>&rsaquo;</button><button>&raquo;</button>
        </div>
      </div>
    </div>
  </div>

<script>
  var rows = [
    { name:'김민준', title:'어린왕자 독서감상문', grade:'2학년', genre:'독서감상문', date:'2025-05-12 16:45', status:'평가 완료', ai:'85점', teacher:'88점' },
    { name:'이서연', title:'봄비 (시 창작)', grade:'1학년', genre:'시 창작', date:'2025-05-13 14:20', status:'제출 완료', ai:'-', teacher:'-' },
    { name:'박지훈', title:'인물의 심리를 분석하는 소설 쓰기', grade:'3학년', genre:'이야기 창작', date:'2025-05-14 10:15', status:'제출 완료', ai:'-', teacher:'-' },
    { name:'최수진', title:'봉사활동 후기', grade:'2학년', genre:'일기·생활문', date:'-', status:'작성 중', ai:'-', teacher:'-' },
    { name:'정예준', title:'물의 세 가지 상태 (설명문)', grade:'1학년', genre:'설명문', date:'-', status:'미제출', ai:'-', teacher:'-' },
    { name:'손희정', title:'가족 여행 기행문', grade:'3학년', genre:'기행문', date:'2025-05-11 09:40', status:'평가 완료', ai:'80점', teacher:'82점' }
  ];

  var statusClass = { '평가 완료':'status-done', '제출 완료':'status-submitted', '작성 중':'status-writing', '미제출':'status-none' };

  var rowsEl = document.getElementById('diagnosisRows');
  rows.forEach(function(r){
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + r.name + '</td>' +
      '<td>' + r.title + '</td>' +
      '<td>' + r.grade + '</td>' +
      '<td>' + r.genre + '</td>' +
      '<td>' + r.date + '</td>' +
      '<td><span class="status-pill ' + statusClass[r.status] + '">' + r.status + '</span></td>' +
      '<td>' + r.ai + '</td>' +
      '<td>' + r.teacher + '</td>';
    rowsEl.appendChild(tr);
  });

  function showView(name){
    document.querySelectorAll('.view').forEach(function(v){ v.style.display = 'none'; });
    document.getElementById('view-' + name).style.display = 'block';
  }

  document.querySelectorAll('[data-view]').forEach(function(el){
    el.addEventListener('click', function(){
      document.querySelectorAll('.sb-item, .sb-leaf').forEach(function(n){ n.classList.remove('active-top','active'); });
      if (el.classList.contains('sb-leaf')) el.classList.add('active');
      else el.classList.add('active-top');
      showView(el.dataset.view);
    });
  });

  document.querySelectorAll('[data-collapsible]').forEach(function(el){
    el.addEventListener('click', function(){ showView('placeholder'); });
  });

  function toggleGroup(toggleId, childrenId, chevronId){
    var toggle = document.getElementById(toggleId);
    var children = document.getElementById(childrenId);
    var chevron = document.getElementById(chevronId);
    var open = true;
    toggle.addEventListener('click', function(){
      open = !open;
      children.style.display = open ? 'block' : 'none';
      chevron.innerHTML = open ? '&#9660;' : '&#9654;';
    });
  }
  toggleGroup('statsToggle', 'statsChildren', 'statsChevron');
  toggleGroup('analysisToggle', 'analysisChildren', 'analysisChevron');
</script>
</body>
</html>
