    { no:6, memberLabel:'학습회원', memberNo:'0023451235', name:'손희진', title:'우리 반 소개 설명문', genre:'설명문', grade:'3학년', score:88, date:'2026.06.15',
      text:'우리 반은 모두 22명이다. 매주 월요일에는 학급 회의를 하고, 금요일에는 독서 시간이 있다. 우리 반 친구들은 모두 사이가 좋다.',
      areas:[ {label:'주제·목적 적합성', score:22, max:25, text:'우리 반을 소개하는 목적에 잘 맞는다.'}, {label:'내용 완성도', score:30, max:35, text:'구체적인 정보(인원, 활동)를 잘 제시했다.'}, {label:'조직과 전개', score:13, max:15, text:'요일별 활동 순서로 자연스럽게 이어진다.'}, {label:'표현과 규범', score:23, max:25, text:'문장이 간결하고 이해하기 쉽다.'} ],
      paras:['반 인원수를 먼저 밝혀 명확하게 시작했다.','요일별 활동을 구체적으로 설명했다.','마무리에 반의 분위기를 덧붙여 훈훈하다.'],
      overall:'짜임새 있는 구성과 구체적인 정보 제시가 돋보이는 설명문이다.' }
  ];

  var rowsEl = document.getElementById('submissionRows');
  submissions.forEach(function(s){
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="col-center">' + s.no + '</td>' +
      '<td><span class="badge">' + s.memberLabel + '</span></td>' +
      '<td>' + s.memberNo + '</td>' +
      '<td>' + s.name + '</td>' +
      '<td>' + s.title + '</td>' +
      '<td class="col-center score">' + s.score + '점</td>' +
      '<td>' + s.date + '</td>' +
      '<td class="col-center"><button class="btn-report" data-no="' + s.no + '">결과리포트 보기</button></td>';
    rowsEl.appendChild(tr);
  });

  document.querySelectorAll('.nav-item').forEach(function(item){
    item.addEventListener('click', function(){
      document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
      item.classList.add('active');
      document.querySelectorAll('.view').forEach(function(v){ v.style.display = 'none'; });
      document.getElementById('view-' + item.dataset.target).style.display = 'block';
    });
  });

  function areaBarStyle(a){ return 'width:' + Math.round(a.score / a.max * 100) + '%'; }

  function openReport(no){
    var s = submissions.find(function(x){ return x.no === no; });
    if (!s) return;
    document.getElementById('reportModalTitle').textContent = s.name + ' 님 결과리포트';
    var areasHtml = s.areas.map(function(a){
      return '<div class="area-item">' +
        '<div class="arow"><span class="area-chip">' + a.label + '</span><span class="area-score">' + a.score + ' / ' + a.max + '점</span></div>' +
        '<div class="area-bar-track"><div class="area-bar-fill" style="' + areaBarStyle(a) + '"></div></div>' +
        '<div class="area-text">' + a.text + '</div>' +
      '</div>';
    }).join('');
    var parasHtml = s.paras.map(function(p, i){
      return '<div class="para-item"><div class="pnum">' + (i+1) + '문단</div><div class="ptext">' + p + '</div></div>';
    }).join('');
    document.getElementById('reportModalBody').innerHTML =
      '<div class="score-card">' +
        '<div class="stitle">' + s.title + ' &middot; ' + s.grade + ' &middot; ' + s.genre + '</div>' +
        '<div class="sbig">' + s.score + '<span>/ 100점</span></div>' +
      '</div>' +
      '<div class="submitted-box"><div class="label">제출한 글</div><div class="text">' + s.text + '</div></div>' +
      '<div class="section-title">영역별 진단</div>' + areasHtml +
      '<div class="section-title">문단별 피드백</div>' + parasHtml +
      '<div class="overall-box"><div class="otitle">전체 총평</div><div class="otext">' + s.overall + '</div></div>';
    document.getElementById('reportOverlay').classList.add('open');
  }

  rowsEl.addEventListener('click', function(e){
    var btn = e.target.closest('.btn-report');
    if (!btn) return;
    openReport(parseInt(btn.dataset.no, 10));
  });

  document.getElementById('reportModalClose').addEventListener('click', function(){
    document.getElementById('reportOverlay').classList.remove('open');
  });
  document.getElementById('reportOverlay').addEventListener('click', function(e){
    if (e.target === this) this.classList.remove('open');
  });
</script>
</body>
</html>
